<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Feednly Player</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.13/dist/hls.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
      position: fixed; top: 0; left: 0;
    }

    #container {
      position: relative;
      width: 100%; height: 100%;
      background: #000;
      cursor: pointer;
    }

    /* VIDEO fullscreen cover */
    #video {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
      background: #000;
    }

    /* MINIATURE fullscreen cover */
    #thumbnail {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      background: #000 center/cover no-repeat;
      z-index: 2;
      transition: opacity 0.3s ease;
    }
    #thumbnail.hidden { opacity: 0; pointer-events: none; }

    /* OVERLAY sombre quand pausé */
    #pause-overlay {
      position: absolute; inset: 0;
      background: rgba(0,0,0,0.35);
      z-index: 3;
      opacity: 0;
      transition: opacity 0.2s ease;
      pointer-events: none;
    }
    #pause-overlay.visible { opacity: 1; }

    /* ICONE play/pause au centre */
    #center-icon {
      position: absolute; inset: 0;
      z-index: 4;
      display: flex; align-items: center; justify-content: center;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s ease;
    }
    #center-icon.visible { opacity: 1; }

    .icon-circle {
      width: 72px; height: 72px;
      border-radius: 50%;
      background: rgba(0,0,0,0.5);
      border: 2px solid rgba(255,255,255,0.8);
      display: flex; align-items: center; justify-content: center;
      backdrop-filter: blur(10px);
    }
    .icon-circle svg { width: 32px; height: 32px; fill: #fff; }
    #icon-play { margin-left: 4px; }

    /* SPINNER */
    #spinner {
      position: absolute; inset: 0;
      z-index: 5;
      display: flex; align-items: center; justify-content: center;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s ease;
    }
    #spinner.visible { opacity: 1; }
    .ring {
      width: 44px; height: 44px;
      border: 3px solid rgba(255,255,255,0.25);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* BARRE DE PROGRESSION draggable */
    #progress-bar {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 44px; /* zone de touch généreuse */
      z-index: 10;
      display: flex; align-items: flex-end;
      touch-action: none;
      cursor: pointer;
      padding-bottom: 0;
    }
    #progress-bg {
      width: 100%;
      height: 4px; /* visuellement fine mais zone de touch 44px */
      background: rgba(255,255,255,0.25);
      position: relative;
      flex-shrink: 0;
    }
    #progress-fill {
      position: absolute; left: 0; top: 0; bottom: 0;
      width: 0%;
      background: #fff;
      border-radius: 0 2px 2px 0;
    }
    #progress-thumb {
      position: absolute;
      top: 50%; left: 0%;
      width: 14px; height: 14px;
      border-radius: 50%;
      background: #fff;
      transform: translate(-50%, -50%);
      box-shadow: 0 2px 6px rgba(0,0,0,0.4);
      opacity: 0;
      transition: opacity 0.15s ease;
      pointer-events: none;
    }
    #progress-bar.dragging #progress-thumb,
    #progress-bar:active #progress-thumb { opacity: 1; }
  </style>
</head>
<body>

<div id="container">

  <video id="video"
    playsinline
    webkit-playsinline
    preload="auto"
    x-webkit-airplay="deny"
    disablepictureinpicture>
  </video>

  <div id="thumbnail"></div>
  <div id="pause-overlay"></div>

  <div id="center-icon">
    <div class="icon-circle">
      <svg id="icon-play" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      <svg id="icon-pause" viewBox="0 0 24 24" style="display:none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
    </div>
  </div>

  <div id="spinner"><div class="ring"></div></div>

  <div id="progress-bar">
    <div id="progress-bg">
      <div id="progress-fill"></div>
      <div id="progress-thumb"></div>
    </div>
  </div>

</div>

<script>
  // =============================================
  // PARAMS URL
  // playback_id = mux playback id
  // thumbnail   = URL miniature
  // =============================================
  const params      = new URLSearchParams(window.location.search);
  const playbackId  = params.get('playback_id') || '';
  const thumbUrl    = params.get('thumbnail') || '';
  const hlsUrl      = playbackId ? `https://stream.mux.com/${playbackId}.m3u8` : '';

  // =============================================
  // ELEMENTS
  // =============================================
  const video         = document.getElementById('video');
  const thumbnail     = document.getElementById('thumbnail');
  const pauseOverlay  = document.getElementById('pause-overlay');
  const centerIcon    = document.getElementById('center-icon');
  const iconPlay      = document.getElementById('icon-play');
  const iconPause     = document.getElementById('icon-pause');
  const spinner       = document.getElementById('spinner');
  const progressBar   = document.getElementById('progress-bar');
  const progressFill  = document.getElementById('progress-fill');
  const progressThumb = document.getElementById('progress-thumb');
  const container     = document.getElementById('container');

  // =============================================
  // STATE
  // =============================================
  let isPlaying      = false;
  let hasStarted     = false;
  let iconTimer      = null;
  let progressRaf    = null;
  let isDragging     = false;
  let playEventSent  = false;

  // =============================================
  // MINIATURE
  // =============================================
  if (thumbUrl) thumbnail.style.backgroundImage = `url(${thumbUrl})`;

  // =============================================
  // NOTIFY BUBBLE
  // =============================================
  function notify(event) {
    const msg = JSON.stringify({ event });
    if (window.ReactNativeWebView) window.ReactNativeWebView.postMessage(msg);
    else window.parent.postMessage(msg, '*');
  }

  // =============================================
  // ICONE flash
  // =============================================
  function flashIcon(type) {
    iconPlay.style.display  = type === 'play'  ? 'block' : 'none';
    iconPause.style.display = type === 'pause' ? 'block' : 'none';
    centerIcon.classList.add('visible');
    if (iconTimer) clearTimeout(iconTimer);
    iconTimer = setTimeout(() => centerIcon.classList.remove('visible'), 600);
  }

  // =============================================
  // PROGRESS RAF
  // =============================================
  function tickProgress() {
    if (!isDragging && video.duration && !isNaN(video.duration)) {
      const pct = (video.currentTime / video.duration) * 100;
      progressFill.style.width = pct + '%';
      progressThumb.style.left = pct + '%';
    }
    progressRaf = requestAnimationFrame(tickProgress);
  }

  // =============================================
  // SEEK depuis position X
  // =============================================
  function seekFromClientX(clientX) {
    const rect = progressBar.getBoundingClientRect();
    const pct = Math.min(1, Math.max(0, (clientX - rect.left) / rect.width));
    if (video.duration && !isNaN(video.duration)) {
      video.currentTime = pct * video.duration;
    }
    progressFill.style.width = (pct * 100) + '%';
    progressThumb.style.left = (pct * 100) + '%';
  }

  // =============================================
  // PROGRESS BAR — drag events
  // =============================================
  progressBar.addEventListener('pointerdown', (e) => {
    e.preventDefault();
    e.stopPropagation(); // ne pas déclencher play/pause
    isDragging = true;
    progressBar.classList.add('dragging');
    progressBar.setPointerCapture(e.pointerId);
    seekFromClientX(e.clientX);
  }, { passive: false });

  progressBar.addEventListener('pointermove', (e) => {
    if (!isDragging) return;
    e.preventDefault();
    seekFromClientX(e.clientX);
  }, { passive: false });

  const endDrag = (e) => {
    if (!isDragging) return;
    isDragging = false;
    progressBar.classList.remove('dragging');
    progressBar.releasePointerCapture(e.pointerId);
  };
  progressBar.addEventListener('pointerup', endDrag);
  progressBar.addEventListener('pointercancel', endDrag);

  // Touch fallback
  progressBar.addEventListener('touchstart', (e) => {
    e.stopPropagation();
    isDragging = true;
    progressBar.classList.add('dragging');
    seekFromClientX(e.touches[0].clientX);
  }, { passive: true });

  progressBar.addEventListener('touchmove', (e) => {
    e.preventDefault();
    if (!isDragging) return;
    seekFromClientX(e.touches[0].clientX);
  }, { passive: false });

  progressBar.addEventListener('touchend', (e) => {
    isDragging = false;
    progressBar.classList.remove('dragging');
    if (e.changedTouches[0]) seekFromClientX(e.changedTouches[0].clientX);
  }, { passive: true });

  // =============================================
  // HLS SETUP
  // =============================================
  function setupHLS() {
    if (!hlsUrl) return;

    if (Hls.isSupported()) {
      const hls = new Hls({ enableWorker: true, backBufferLength: 30 });
      hls.loadSource(hlsUrl);
      hls.attachMedia(video);
      hls.on(Hls.Events.ERROR, (event, data) => {
        if (data.fatal) {
          if (data.type === Hls.ErrorTypes.NETWORK_ERROR) hls.startLoad();
          else if (data.type === Hls.ErrorTypes.MEDIA_ERROR) hls.recoverMediaError();
          else hls.destroy();
        }
      });
    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
      // iOS Safari — HLS natif
      video.src = hlsUrl;
    }
  }

  // =============================================
  // PLAY
  // =============================================
  function doPlay() {
    spinner.classList.add('visible');
    video.muted = false;
    video.play().then(() => {
      spinner.classList.remove('visible');
    }).catch(() => {
      video.muted = true;
      video.play().catch(() => spinner.classList.remove('visible'));
    });
  }

  // =============================================
  // TAP container — play / pause
  // =============================================
  container.addEventListener('click', (e) => {
    // Ignorer si c'est un drag sur la progress bar
    if (e.target === progressBar || progressBar.contains(e.target)) return;
    if (!hlsUrl) return;

    if (!hasStarted) {
      hasStarted = true;
      thumbnail.classList.add('hidden');
      setupHLS();
      doPlay();
      progressRaf = requestAnimationFrame(tickProgress);
      return;
    }

    if (isPlaying) video.pause();
    else doPlay();
  });

  // =============================================
  // EVENTS VIDEO
  // =============================================
  video.addEventListener('play', () => {
    isPlaying = true;
    pauseOverlay.classList.remove('visible');
    flashIcon('play');
    if (!playEventSent) {
      playEventSent = true;
      notify('play');
    }
  });

  video.addEventListener('pause', () => {
    isPlaying = false;
    pauseOverlay.classList.add('visible');
    flashIcon('pause');
  });

  video.addEventListener('ended', () => {
    isPlaying = false;
    pauseOverlay.classList.remove('visible');
    centerIcon.classList.remove('visible');
    progressFill.style.width = '100%';
    progressThumb.style.left = '100%';
    notify('ended');
  });

  video.addEventListener('waiting', () => spinner.classList.add('visible'));
  video.addEventListener('playing', () => spinner.classList.remove('visible'));

  // =============================================
  // AFFICHER ICONE PLAY au départ
  // =============================================
  iconPlay.style.display = 'block';
  iconPause.style.display = 'none';
  centerIcon.classList.add('visible');
</script>

</body>
</html>
