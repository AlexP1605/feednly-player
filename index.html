<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Feednly Player</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.13/dist/hls.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      position: fixed; top: 0; left: 0;
    }

    #container {
      position: relative;
      width: 100%; height: 100%;
      background: #000;
      cursor: pointer;
    }

    /* VIDEO — cover fullscreen */
    #video {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
      background: #000;
    }

    /* MINIATURE — cover fullscreen, disparaît au play */
    #thumbnail {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      z-index: 2;
      transition: opacity 0.3s ease;
      background: #000 center/cover no-repeat;
    }
    #thumbnail.hidden {
      opacity: 0;
      pointer-events: none;
    }

    /* OVERLAY sombre quand pausé */
    #pause-overlay {
      position: absolute; inset: 0;
      background: rgba(0,0,0,0.35);
      z-index: 3;
      opacity: 0;
      transition: opacity 0.2s ease;
      pointer-events: none;
    }
    #pause-overlay.visible { opacity: 1; }

    /* ICONE play/pause au centre */
    #center-icon {
      position: absolute; inset: 0;
      z-index: 4;
      display: flex; align-items: center; justify-content: center;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s ease;
    }
    #center-icon.visible { opacity: 1; }

    .icon-circle {
      width: 72px; height: 72px;
      border-radius: 50%;
      background: rgba(0,0,0,0.5);
      border: 2px solid rgba(255,255,255,0.8);
      display: flex; align-items: center; justify-content: center;
      backdrop-filter: blur(10px);
    }
    .icon-circle svg { width: 32px; height: 32px; fill: #fff; }
    #icon-play { margin-left: 4px; }

    /* SPINNER chargement */
    #spinner {
      position: absolute; inset: 0;
      z-index: 5;
      display: flex; align-items: center; justify-content: center;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s ease;
    }
    #spinner.visible { opacity: 1; }
    .ring {
      width: 44px; height: 44px;
      border: 3px solid rgba(255,255,255,0.25);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* BARRE DE PROGRESSION */
    #progress {
      position: absolute; bottom: 0; left: 0; right: 0;
      height: 3px;
      background: rgba(255,255,255,0.2);
      z-index: 6;
      pointer-events: none;
    }
    #progress-fill {
      height: 100%;
      background: #fff;
      width: 0%;
    }
  </style>
</head>
<body>

<div id="container">

  <video id="video"
    playsinline
    webkit-playsinline
    preload="auto"
    x-webkit-airplay="deny"
    disablepictureinpicture>
  </video>

  <div id="thumbnail"></div>

  <div id="pause-overlay"></div>

  <div id="center-icon">
    <div class="icon-circle">
      <svg id="icon-play" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      <svg id="icon-pause" viewBox="0 0 24 24" style="display:none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
    </div>
  </div>

  <div id="spinner"><div class="ring"></div></div>

  <div id="progress"><div id="progress-fill"></div></div>

</div>

<script>
  // =====================================================
  // PARAMS depuis l'URL
  // ex: index.html?playback_id=XXX&thumbnail=https://...
  // =====================================================
  const params = new URLSearchParams(window.location.search);
  const playbackId  = params.get('playback_id') || '';
  const thumbnailUrl = params.get('thumbnail') || '';
  const hlsUrl = playbackId ? `https://stream.mux.com/${playbackId}.m3u8` : '';

  // =====================================================
  // ELEMENTS
  // =====================================================
  const video         = document.getElementById('video');
  const thumbnail     = document.getElementById('thumbnail');
  const pauseOverlay  = document.getElementById('pause-overlay');
  const centerIcon    = document.getElementById('center-icon');
  const iconPlay      = document.getElementById('icon-play');
  const iconPause     = document.getElementById('icon-pause');
  const spinner       = document.getElementById('spinner');
  const progressFill  = document.getElementById('progress-fill');
  const container     = document.getElementById('container');

  // =====================================================
  // STATE
  // =====================================================
  let isPlaying       = false;
  let hasPlayed       = false;  // première lecture
  let iconTimer       = null;
  let progressRaf     = null;
  let playEventSent   = false;  // envoyer play une seule fois par session

  // =====================================================
  // MINIATURE
  // =====================================================
  if (thumbnailUrl) {
    thumbnail.style.backgroundImage = `url(${thumbnailUrl})`;
  }

  // =====================================================
  // NOTIFY BUBBLE via postMessage
  // =====================================================
  function notify(event) {
    const msg = JSON.stringify({ event });
    if (window.ReactNativeWebView) {
      window.ReactNativeWebView.postMessage(msg);
    } else {
      window.parent.postMessage(msg, '*');
    }
  }

  // =====================================================
  // AFFICHER ICONE play ou pause brièvement
  // =====================================================
  function flashIcon(type) {
    iconPlay.style.display  = type === 'play'  ? 'block' : 'none';
    iconPause.style.display = type === 'pause' ? 'block' : 'none';
    centerIcon.classList.add('visible');
    if (iconTimer) clearTimeout(iconTimer);
    iconTimer = setTimeout(() => centerIcon.classList.remove('visible'), 600);
  }

  // =====================================================
  // BARRE DE PROGRESSION
  // =====================================================
  function updateProgress() {
    if (video.duration && !isNaN(video.duration)) {
      progressFill.style.width = (video.currentTime / video.duration * 100) + '%';
    }
    progressRaf = requestAnimationFrame(updateProgress);
  }

  // =====================================================
  // HLS SETUP
  // =====================================================
  function setupHLS() {
    if (!hlsUrl) return;

    if (Hls.isSupported()) {
      const hls = new Hls({
        enableWorker: true,
        lowLatencyMode: false,
        backBufferLength: 30,
      });
      hls.loadSource(hlsUrl);
      hls.attachMedia(video);
      hls.on(Hls.Events.ERROR, (event, data) => {
        if (data.fatal) {
          switch (data.type) {
            case Hls.ErrorTypes.NETWORK_ERROR:
              hls.startLoad(); break;
            case Hls.ErrorTypes.MEDIA_ERROR:
              hls.recoverMediaError(); break;
            default:
              hls.destroy(); break;
          }
        }
      });
    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
      // iOS Safari — HLS natif
      video.src = hlsUrl;
    }
  }

  // =====================================================
  // PLAY
  // =====================================================
  function doPlay() {
    spinner.classList.add('visible');
    video.muted = false;
    video.play().then(() => {
      spinner.classList.remove('visible');
    }).catch(() => {
      // Autoplay bloqué — essayer muet
      video.muted = true;
      video.play().catch(() => spinner.classList.remove('visible'));
    });
  }

  // =====================================================
  // TAP — toggle play/pause
  // =====================================================
  container.addEventListener('click', () => {
    if (!hlsUrl) return;

    if (!hasPlayed) {
      // Premier tap : cacher miniature et lancer
      hasPlayed = true;
      thumbnail.classList.add('hidden');
      setupHLS();
      doPlay();
      return;
    }

    if (isPlaying) {
      video.pause();
    } else {
      doPlay();
    }
  });

  // =====================================================
  // EVENTS VIDEO
  // =====================================================
  video.addEventListener('play', () => {
    isPlaying = true;
    pauseOverlay.classList.remove('visible');
    flashIcon('play');
    progressRaf = requestAnimationFrame(updateProgress);

    // Envoyer event play à Bubble (une seule fois par vidéo)
    if (!playEventSent) {
      playEventSent = true;
      notify('play');
    }
  });

  video.addEventListener('pause', () => {
    isPlaying = false;
    pauseOverlay.classList.add('visible');
    flashIcon('pause');
    if (progressRaf) cancelAnimationFrame(progressRaf);
  });

  video.addEventListener('ended', () => {
    isPlaying = false;
    pauseOverlay.classList.remove('visible');
    centerIcon.classList.remove('visible');
    if (progressRaf) cancelAnimationFrame(progressRaf);
    progressFill.style.width = '100%';
    notify('ended');
  });

  video.addEventListener('waiting', () => {
    spinner.classList.add('visible');
  });

  video.addEventListener('playing', () => {
    spinner.classList.remove('visible');
  });

  video.addEventListener('timeupdate', () => {
    if (video.duration && !isNaN(video.duration)) {
      progressFill.style.width = (video.currentTime / video.duration * 100) + '%';
    }
  });

  // =====================================================
  // AFFICHER ICONE PLAY au départ si miniature présente
  // =====================================================
  if (thumbnailUrl || playbackId) {
    iconPlay.style.display = 'block';
    iconPause.style.display = 'none';
    centerIcon.classList.add('visible');
  }
</script>

</body>
</html>
